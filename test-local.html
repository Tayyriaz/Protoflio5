<!DOCTYPE html>
<html>
<head>
    <title>Local Test - Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .test-item {
            padding: 10px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
        }
        .success { border-left-color: #28a745; }
        .error { border-left-color: #dc3545; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>Portfolio Deployment Test</h1>
        
        <div class="test-item">
            <strong>Test 1:</strong> Check if CSS file exists
            <div id="css-test">Testing...</div>
        </div>
        
        <div class="test-item">
            <strong>Test 2:</strong> Check if JS file exists
            <div id="js-test">Testing...</div>
        </div>
        
        <div class="test-item">
            <strong>Test 3:</strong> Check file paths
            <div id="path-test">Testing...</div>
        </div>
        
        <button onclick="runTests()">Run Tests</button>
        <button onclick="window.location.href='index.html'">Open Portfolio</button>
    </div>
    
    <script>
        function checkFile(url) {
            return fetch(url, { method: 'HEAD' })
                .then(response => response.ok)
                .catch(() => false);
        }
        
        async function runTests() {
            // Test CSS
            const cssExists = await checkFile('/styles.css');
            document.getElementById('css-test').innerHTML = 
                cssExists ? '<span class="success">✅ CSS file found</span>' : 
                '<span class="error">❌ CSS file not found</span>';
            
            // Test JS
            const jsExists = await checkFile('/script.js');
            document.getElementById('js-test').innerHTML = 
                jsExists ? '<span class="success">✅ JS file found</span>' : 
                '<span class="error">❌ JS file not found</span>';
            
            // Test paths
            const cssLink = document.querySelector('link[href*="styles.css"]');
            const jsScript = document.querySelector('script[src*="script.js"]');
            document.getElementById('path-test').innerHTML = 
                (cssLink && jsScript) ? 
                '<span class="success">✅ Paths configured correctly</span>' : 
                '<span class="error">❌ Paths need checking</span>';
        }
        
        // Auto-run on load
        window.onload = runTests;
    </script>
</body>
</html>
