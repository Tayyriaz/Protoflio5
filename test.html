<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Portfolio Styling</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Quick test to verify CSS is loading */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .test-box {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .test-box h1 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        .test-box p {
            color: #4a5568;
            margin-bottom: 1rem;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>✅ CSS is Working!</h1>
        <p>If you see styled content, CSS is loading correctly.</p>
        <p>If styling is missing, check browser console for errors.</p>
        <a href="index.html" class="btn">Go to Portfolio</a>
    </div>
</body>
</html>
